<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4A017;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9A6F00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1208;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C1E06;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Dark background rounded square -->
  <rect width="32" height="32" rx="6" ry="6" fill="url(#bgGrad)"/>

  <!-- Bridge arch (two towers + arch span) -->
  <!-- Left tower -->
  <rect x="5" y="12" width="3" height="13" fill="url(#goldGrad)" rx="0.5"/>
  <!-- Right tower -->
  <rect x="24" y="12" width="3" height="13" fill="url(#goldGrad)" rx="0.5"/>
  <!-- Bridge deck -->
  <rect x="5" y="22" width="22" height="2.5" fill="url(#goldGrad)" rx="0.5"/>
  <!-- Arch cables / suspenders -->
  <line x1="6.5" y1="12" x2="10" y2="22" stroke="url(#goldGrad)" stroke-width="1"/>
  <line x1="25.5" y1="12" x2="22" y2="22" stroke="url(#goldGrad)" stroke-width="1"/>
  <line x1="6.5" y1="12" x2="16" y2="22" stroke="url(#goldGrad)" stroke-width="0.7" opacity="0.6"/>
  <line x1="25.5" y1="12" x2="16" y2="22" stroke="url(#goldGrad)" stroke-width="0.7" opacity="0.6"/>

  <!-- "E" lettermark at top center -->
  <text x="16" y="11" font-family="Georgia, serif" font-size="8" font-weight="bold"
        fill="url(#goldGrad)" text-anchor="middle" dominant-baseline="middle">E</text>

  <!-- Subtle gold shine line at top of bg -->
  <rect x="0" y="0" width="32" height="2" rx="6" fill="#F5C842" opacity="0.08"/>
</svg>
